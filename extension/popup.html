<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixaDown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0a;
        --surface: #111111;
        --surface-hi: #161616;
        --border: #1f1f1f;
        --border-hi: #2e2e2e;
        --text: #ededed;
        --text-dim: #a1a1a1;
        --muted: #666;
        --green: #22c55e;
        --red: #ef4444;
        --amber: #f59e0b;
        --radius: 6px;
      }

      body {
        width: 340px;
        background: var(--bg);
        color: var(--text);
        font-family: "Geist", sans-serif;
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* ─── Header ─────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 16px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .logo-mark {
        width: 22px;
        height: 22px;
        background: var(--text);
        border-radius: 5px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }

      .logo-name {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--text);
        line-height: 1.2;
      }

      .logo-name span {
        color: var(--muted);
        font-weight: 400;
      }

      .logo-byline {
        font-size: 10px;
        font-weight: 400;
        color: var(--muted);
        letter-spacing: 0;
        margin-top: 1px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .version-badge {
        font-family: "Geist Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        padding: 2px 6px;
        border: 1px solid var(--border);
        border-radius: 3px;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border-hi);
        transition:
          background 0.25s,
          box-shadow 0.25s;
      }
      .status-dot.idle {
        background: var(--border-hi);
      }
      .status-dot.ready {
        background: var(--green);
        box-shadow: 0 0 7px var(--green);
      }
      .status-dot.busy {
        background: var(--amber);
        box-shadow: 0 0 7px var(--amber);
        animation: pulse 1s ease-in-out infinite;
      }
      .status-dot.error {
        background: var(--red);
        box-shadow: 0 0 7px var(--red);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* ─── Preview card ───────────────────────────────── */
      .preview-card {
        margin: 12px 16px 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
      }

      /* empty state */
      .preview-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 28px 20px;
        color: var(--muted);
        text-align: center;
      }

      .preview-empty svg {
        opacity: 0.35;
      }
      .preview-empty p {
        font-size: 12px;
        line-height: 1.6;
      }

      /* loaded state */
      .preview-loaded {
        display: none;
      }

      .preview-thumb-wrap {
        position: relative;
        height: 130px;
        overflow: hidden;
        background: var(--surface-hi);
      }

      .preview-thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: opacity 0.3s;
      }

      .preview-thumb.loading {
        opacity: 0;
      }

      .thumb-shimmer {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          var(--surface) 25%,
          var(--surface-hi) 50%,
          var(--surface) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }
      @keyframes shimmer {
        to {
          background-position: -200% 0;
        }
      }

      .preview-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.65) 0%,
          transparent 55%
        );
        pointer-events: none;
      }

      .preview-info {
        padding: 9px 12px 10px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .preview-tags {
        font-size: 11px;
        color: var(--text-dim);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .preview-id {
        font-family: "Geist Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        flex-shrink: 0;
        padding: 2px 6px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: var(--bg);
      }

      /* ─── URL row ────────────────────────────────────── */
      .url-row {
        display: flex;
        gap: 6px;
        margin: 10px 16px 0;
      }

      .url-input {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "Geist Mono", monospace;
        font-size: 11px;
        padding: 7px 10px;
        outline: none;
        transition: border-color 0.15s;
        min-width: 0;
      }

      .url-input::placeholder {
        color: var(--muted);
      }
      .url-input:focus {
        border-color: var(--border-hi);
      }

      .btn-tab {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-dim);
        padding: 0 11px;
        font-size: 11px;
        font-family: "Geist", sans-serif;
        cursor: pointer;
        white-space: nowrap;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
        flex-shrink: 0;
      }

      .btn-tab:hover {
        border-color: var(--border-hi);
        color: var(--text);
        background: var(--surface-hi);
      }

      /* ─── Download button ────────────────────────────── */
      .download-wrap {
        padding: 10px 16px 0;
      }

      .btn-download {
        width: 100%;
        background: var(--text);
        color: #000;
        border: none;
        border-radius: var(--radius);
        font-family: "Geist", sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        letter-spacing: -0.015em;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }

      .btn-download:hover:not(:disabled) {
        opacity: 0.85;
      }
      .btn-download:active:not(:disabled) {
        transform: scale(0.99);
      }
      .btn-download:disabled {
        opacity: 0.25;
        cursor: not-allowed;
      }

      .btn-spinner {
        display: none;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(0, 0, 0, 0.15);
        border-top-color: #000;
        border-radius: 50%;
        animation: spin 0.55s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ─── Status bar ─────────────────────────────────── */
      .status-bar {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 9px 16px;
        min-height: 36px;
        border-top: 1px solid var(--border);
        margin-top: 12px;
      }

      .status-icon {
        font-size: 11px;
        flex-shrink: 0;
        width: 14px;
        text-align: center;
        color: var(--muted);
      }

      .status-text {
        font-size: 11px;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-text.ok {
        color: var(--green);
      }
      .status-text.err {
        color: var(--red);
      }
      .status-text.dim {
        color: var(--muted);
      }

    </style>
  </head>
  <body>
    <!-- ── Header ── -->
    <div class="header">
      <div class="logo">
        <div class="logo-mark">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <rect x="1" y="1" width="4" height="4" fill="#0a0a0a" />
            <rect x="7" y="1" width="4" height="4" fill="#0a0a0a" />
            <rect x="1" y="7" width="4" height="4" fill="#0a0a0a" />
            <rect x="7" y="7" width="4" height="4" fill="#0a0a0a" />
          </svg>
        </div>
        <div>
          <div class="logo-name">PixaDown</div>
          <div class="logo-byline">by Fahad Mapari</div>
        </div>
      </div>
      <div class="header-right">
        <span class="version-badge">v1.0</span>
        <div class="status-dot idle" id="statusDot"></div>
      </div>
    </div>

    <!-- ── Preview card ── -->
    <div class="preview-card">
      <!-- Empty state -->
      <div class="preview-empty" id="previewEmpty">
        <svg
          width="28"
          height="28"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.2"
        >
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 15l-5-5L5 21"
          />
        </svg>
        <p>
          Open a Pixabay image page and<br />click
          <strong style="color: var(--text-dim)">Current tab</strong>, or paste
          a URL below.
        </p>
      </div>

      <!-- Loaded state -->
      <div class="preview-loaded" id="previewLoaded">
        <div class="preview-thumb-wrap">
          <div class="thumb-shimmer" id="thumbShimmer"></div>
          <img class="preview-thumb loading" id="previewThumb" src="" alt="" />
          <div class="preview-overlay"></div>
        </div>
        <div class="preview-info">
          <span class="preview-tags" id="previewTags">—</span>
          <span class="preview-id" id="previewId">—</span>
        </div>
      </div>
    </div>

    <!-- ── URL input ── -->
    <div class="url-row">
      <input
        class="url-input"
        id="urlInput"
        type="text"
        placeholder="https://pixabay.com/photos/slug-123456/"
      />
      <button class="btn-tab" id="btnTab">Current tab</button>
    </div>

    <!-- ── Download button ── -->
    <div class="download-wrap">
      <button class="btn-download" id="btnDownload" disabled>
        <span class="btn-spinner" id="btnSpinner"></span>
        <svg
          id="btnIcon"
          width="14"
          height="14"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 3v13M7 11l5 5 5-5M4 20h16"
          />
        </svg>
        <span id="btnLabel">Download Image</span>
      </button>
    </div>

    <!-- ── Status bar ── -->
    <div class="status-bar">
      <span class="status-icon" id="statusIcon">·</span>
      <span class="status-text dim" id="statusText"
        >Waiting for a Pixabay URL</span
      >
    </div>

    <script src="popup.js"></script>
  </body>
</html>
